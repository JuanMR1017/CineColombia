<section class="data-section">

    <div class="section-header">

        <h3>
            <i class="fa-solid fa-ticket-simple"></i>
            Nueva Venta
        </h3>

        <p>
            Registro de venta de boletería
        </p>

    </div>


    <!-- DATOS PRINCIPALES -->

    <div class="venta-grid">

        <div class="form-group">

            <label>
                Cédula del Cliente
            </label>

            <div style="display: flex; gap: 10px;">
                <input type="text"
                       id="txtCedulaCliente"
                       class="input-control"
                       style="flex: 1;"
                       placeholder="Ingrese la cédula...">

                <button type="button" id="btnBuscarCliente" class="btn-info" style="padding: 10px 15px; border: none; border-radius: 6px; background-color: #007bff; color: white; cursor: pointer;">
                    <i class="fa-solid fa-search"></i>
                </button>
            </div>

        </div>

        <div class="form-group">
            <label>
                Nombre del Cliente
            </label>
            <input type="text"
                   id="txtNombreCliente"
                   class="input-control"
                   readonly
                   style="background-color: #e9ecef; cursor: not-allowed;"
                   placeholder="Nombre del cliente...">
        </div>

        <div class="form-group">
            <label>
                Tipo de Documento
            </label>
            <input type="text"
                   id="txtTipoDocumento"
                   class="input-control"
                   readonly
                   style="background-color: #e9ecef; cursor: not-allowed;"
                   placeholder="Tipo de documento...">
        </div>

        <div class="form-group">

            <label>
                Función
            </label>

            <select id="cmbFuncion" class="input-control">

                <option>
                    Seleccione una función
                </option>

                <option>
                    Deadpool 3 - Sala 1 - 12:00 PM
                </option>

                <option>
                    Furiosa - Sala 2 - 02:30 PM
                </option>

            </select>

        </div>


        <div class="form-group">

            <label>
                Método de Pago
            </label>

            <select id="cmbMetodoPago" class="input-control">

                <option>Efectivo</option>
                <option>Tarjeta</option>
                <option>Nequi</option>

            </select>

        </div>

    </div>


    <!-- INFO FUNCION -->

    <div class="funcion-info">

        <div class="info-box">

            <span>Fecha</span>
            <strong>27 de Septiembre</strong>

        </div>

        <div class="info-box">

            <span>Película</span>
            <strong>Deadpool 3</strong>

        </div>

        <div class="info-box">

            <span>Sala</span>
            <strong>Sala 1</strong>

        </div>

        <div class="info-box">

            <span>Formato</span>
            <strong>3D</strong>

        </div>

        <div class="info-box">

            <span>Precio Base</span>
            <strong>$15.000</strong>

        </div>

    </div>


    <!-- PANTALLA -->

    <div class="cinema-screen">

        PANTALLA

    </div>


    <!-- SILLAS -->

    <div class="seats-container">

        <!-- FILA A -->

        <button class="seat available">
            A1
        </button>

        <button class="seat available">
            A2
        </button>

        <button class="seat occupied">
            A3
        </button>

        <button class="seat available">
            A4
        </button>

        <button class="seat available">
            A5
        </button>


        <!-- FILA B -->

        <button class="seat available">
            B1
        </button>

        <button class="seat selected">
            B2
        </button>

        <button class="seat occupied">
            B3
        </button>

        <button class="seat available">
            B4
        </button>

        <button class="seat available">
            B5
        </button>

    </div>


    <!-- RESUMEN -->

    <div class="venta-summary">

        <h4>
            Resumen de Compra
        </h4>

        <div class="summary-row">

            <span>
                Sillas Seleccionadas
            </span>

            <strong id="lblSillas">
                B2
            </strong>

        </div>

        <div class="summary-row">

            <span>
                Cantidad
            </span>

            <strong id="lblCantidad">
                1
            </strong>

        </div>

        <div class="summary-row total">

            <span>
                Total
            </span>

            <strong id="lblTotal">
                $15.000
            </strong>

        </div>


        <button id="btnRegistrarVenta" class="btn-confirm-sale">

            <i class="fa-solid fa-check"></i>

            Confirmar Venta

        </button>

    </div>

</section>
