<div class="content-section" id="funciones">
    <div class="header">
        <h2>Gestión de Funciones</h2>
    </div>

    <div class="form-container">
        <form id="form-funciones">
            <div class="form-row">
                <div class="form-group">
                    <label for="id_sala">Sala:</label>
                    <select id="id_sala" name="id_sala" required>
                        <option value="">Seleccione una sala</option>
                        <!-- Opciones de salas se cargarían dinámicamente -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="id_pelicula">Película:</label>
                    <select id="id_pelicula" name="id_pelicula" required>
                        <option value="">Seleccione una película</option>
                        <!-- Opciones de películas se cargarían dinámicamente -->
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="id_idioma">Idioma:</label>
                    <select id="id_idioma" name="id_idioma" required>
                        <option value="">Seleccione idioma</option>
                        <!-- Opciones de idiomas -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="id_formato">Formato:</label>
                    <select id="id_formato" name="id_formato" required>
                        <option value="">Seleccione formato</option>
                        <!-- Opciones de formatos -->
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="fecha_funcion">Fecha:</label>
                    <input type="date" id="fecha_funcion" name="fecha_funcion" required>
                </div>
                <div class="form-group">
                    <label for="hora_inicio">Hora Inicio:</label>
                    <input type="time" id="hora_inicio" name="hora_inicio" required>
                </div>
                <div class="form-group">
                    <label for="hora_fin">Hora Fin:</label>
                    <input type="time" id="hora_fin" name="hora_fin" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="precio_base">Precio Base:</label>
                    <input type="number" id="precio_base" name="precio_base" step="0.01" required>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="estado" name="estado" checked>
                        Activo
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-success">Guardar Función</button>
                <button type="reset" class="btn-secondary">Limpiar</button>
            </div>
        </form>
    </div>

    <!-- Opcional: Tabla de funciones registradas -->
    <div class="list-container mt-4">
        <h3>Funciones Registradas</h3>
        <table class="table" id="tabla-funciones">
            <thead>
                <tr>
                    <th>Película</th>
                    <th>Sala</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Precio</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Registros de funciones -->
            </tbody>
        </table>
    </div>
</div>
