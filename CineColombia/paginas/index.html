<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Login CineColombia</title>

    <link rel="stylesheet" href="../css/estilos.css" />
    <script src="../Scripts/jquery-3.7.0.min.js"></script>
    <script src="../Scrips_From/login.js"></script>
</head>

<body>
    <div class="login-box">
        <div class="logo-container">
            <img src="../imagenes/logo-cinecolombia.png" alt="Logo Cine Colombia" class="img-logo" />
        </div>
        <h2>Iniciar Sesión</h2>

        <input type="text" id="txtUser" placeholder="Usuario" />
        <input type="password" id="txtPass" placeholder="Contraseña" />

        <button id="btnLogin">Iniciar Sesión</button>
        <p id="error" style="color: red; font-size: 12px;"></p>
    </div>
</body>
</html>
